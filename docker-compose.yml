services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: parking_locator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/parking_locator
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - osm_data:/app/docker/osm

volumes:
  postgres_data:
  osm_data:
